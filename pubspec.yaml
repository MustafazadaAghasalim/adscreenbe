name: adscreen_kiosk
description: Adscreen Belgium — interactive in-vehicle advertising kiosk (Flutter).
publish_to: 'none'
version: 1.1.0+11

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Real-time
  socket_io_client: ^2.0.3
  web_socket_channel: ^2.4.0
  mqtt_client: ^10.11.1
  flutter_webrtc: ^0.14.2
  flutter_background_service: ^5.1.0
  
  # Firebase (For Real-time Ads)
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking & Device
  dio: ^5.0.0
  http: ^1.2.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  device_info_plus: ^10.1.0
  connectivity_plus: ^5.0.2
  geolocator: ^10.0.0
  battery_plus: ^6.0.0
  wakelock_plus: ^1.2.0
  package_info_plus: ^9.0.0
  android_id: ^0.4.0
  kiosk_mode: ^0.8.0
  
  # UI / Media
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.1
  video_player: ^2.8.2
  chewie: ^1.7.0
  intl: ^0.20.2
  easy_localization: ^3.0.7
  google_fonts: ^6.1.0
  volume_controller: ^2.0.0
  disk_space_2: ^1.0.11
  intl_phone_field: ^3.2.0
  pinput: ^3.0.0
  shimmer: ^3.0.0
  auto_size_text: ^3.0.0
  qr_flutter: ^4.1.0
  
  # Database
  sqflite: ^2.3.0
  
  # ML & Face Detection
  google_mlkit_face_detection: ^0.11.0
  
  # Remote Management
  firebase_core: ^4.3.0
  firebase_storage: ^13.0.0
  cloud_firestore: ^6.0.0
  firebase_remote_config: ^6.0.0
  firebase_auth: ^6.0.0
  ota_update: ^7.0.1
  restart_app: ^1.2.1
  url_launcher: ^6.2.1
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/translations/
  
  fonts:
    - family: Kinetika
      fonts:
        - asset: assets/fonts/Kinetika-Medium.ttf
