name: adscreen_kiosk
description: A new Flutter project for Adscreen Kiosk.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Real-time
  socket_io_client: ^2.0.3
  
  # Firebase (For Real-time Ads)
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking & Device
  dio: ^5.0.0
  http: ^1.1.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  device_info_plus: ^9.0.0
  connectivity_plus: ^5.0.2
  geolocator: ^10.0.0
  battery_plus: ^5.0.0
  wakelock_plus: ^1.1.0
  package_info_plus: ^4.0.0
  android_id: ^0.4.0
  kiosk_mode: ^0.8.0
  
  # UI / Media
  cached_network_image: ^3.3.0
  video_player: ^2.8.2
  chewie: ^1.7.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  volume_controller: ^2.0.0
  disk_space_2: ^1.0.11
  intl_phone_field: ^3.2.0
  pinput: ^3.0.0
  
  # Remote Management
  firebase_core: ^2.24.2
  firebase_storage: ^11.5.0
  cloud_firestore: ^4.14.0
  firebase_remote_config: ^4.3.8
  ota_update: ^7.0.1
  restart_app: ^1.2.1
  url_launcher: ^6.2.1
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  
  fonts:
    - family: Kinetika
      fonts:
        - asset: assets/fonts/Kinetika-Medium.ttf
