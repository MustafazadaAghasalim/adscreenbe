<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Belgian stripe -->
  <rect x="0" y="0" width="12" height="630" fill="#000000"/>
  <rect x="12" y="0" width="12" height="630" fill="#FDDA24"/>
  <rect x="24" y="0" width="12" height="630" fill="#EF3340"/>

  <!-- Brand dot -->
  <circle cx="120" cy="100" r="14" fill="#8B5CF6"/>
  <circle cx="120" cy="100" r="22" fill="none" stroke="#8B5CF6" stroke-opacity="0.4" stroke-width="2"/>

  <text x="160" y="110" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#E5E7EB">
    adscreen<tspan fill="#8B5CF6">.be</tspan>
  </text>

  <!-- Eyebrow chip -->
  <g transform="translate(80, 200)">
    <rect width="220" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="110" y="23" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E5E7EB" letter-spacing="3">
      BELGIUM · Q3 2026
    </text>
  </g>

  <!-- Main title -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="#E5E7EB" letter-spacing="-3">
    Digital taxi advertising,
  </text>
  <text x="80" y="400" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="700" fill="url(#accent)" letter-spacing="-3">
    coming to Belgium.
  </text>

  <!-- Subtitle -->
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="24" fill="rgba(229,231,235,0.62)">
    Brussels · Antwerp · Liège — launching Q3 2026
  </text>

  <!-- URL -->
  <text x="80" y="560" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#8B5CF6">
    adscreen.be
  </text>
</svg>
